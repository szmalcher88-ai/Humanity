<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AKHET — Giza Plateau, c. 2550 BCE</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0908;
        width: 100%;
        height: 100%;
      }
      #app,
      #app canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0908;
        color: #d8c9a8;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        z-index: 10000;
        transition: opacity 0.4s;
      }
      #boot h1 {
        font-size: 18px;
        letter-spacing: 0.35em;
        font-weight: normal;
        margin: 0 0 18px 0;
      }
      #boot-bar {
        width: 320px;
        height: 3px;
        background: #2a241c;
        border-radius: 2px;
        overflow: hidden;
      }
      #boot-fill {
        width: 0%;
        height: 100%;
        background: #d8c9a8;
        transition: width 0.2s;
      }
      #boot-msg {
        margin-top: 12px;
        font-size: 11px;
        color: #8a7d64;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">
      <h1>A K H E T</h1>
      <div id="boot-bar"><div id="boot-fill"></div></div>
      <div id="boot-msg">boot</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
